name: Apply placemark name selection

on:
  push:
    branches:
      - main
    paths:
      - tools/apply-placemark-name-selection.ps1
      - .github/workflows/apply-placemark-name-selection.yml

permissions:
  contents: write

jobs:
  apply-and-build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply source changes
        shell: pwsh
        run: ./tools/apply-placemark-name-selection.ps1

      - name: Build solution
        shell: pwsh
        run: dotnet build ./KmlScopedEditor.sln --configuration Release

      - name: Commit validated source changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add KmlScopedEditor/ViewModels/MainViewModel.cs KmlScopedEditor/MainWindow.xaml.cs
          if (git diff --cached --quiet) {
            Write-Host "No source changes to commit."
            exit 0
          }
          git commit -m "Add placemark name search selection"
          git push origin HEAD:main
