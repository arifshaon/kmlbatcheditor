name: Process opacity controls feature

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  transform-build-and-commit:
    if: github.head_ref == 'feature/opacity-controls'
    runs-on: windows-latest

    steps:
      - name: Check out opacity feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/opacity-controls
          fetch-depth: 0

      - name: Apply deterministic source transformations once
        shell: pwsh
        run: |
          $batch = Get-Content -Raw 'KmlScopedEditor/Services/KmlBatchEditService.cs'
          if ($batch.Contains('string? iconBgr = null;')) {
            Write-Host 'Opacity transformations are already present.'
            exit 0
          }

          python .github/opacity-feature/apply.py 1>$null 2>.github/opacity-transform-error.txt
          if ($LASTEXITCODE -ne 0) {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/opacity-transform-error.txt
            git commit -m "Record opacity transformer error"
            git push origin HEAD:feature/opacity-controls
            throw "Opacity source transformation failed. See .github/opacity-transform-error.txt on the feature branch."
          }

      - name: Validate XAML
        shell: pwsh
        run: |
          [xml](Get-Content -Raw 'KmlScopedEditor/MainWindow.xaml') | Out-Null
          Write-Host 'MainWindow.xaml is well-formed XML.'

      - name: Build Windows application
        shell: pwsh
        run: |
          dotnet build .\KmlScopedEditor.sln --configuration Release --nologo

      - name: Commit transformed source when needed
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No source transformation commit is required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add KmlScopedEditor
          git commit -m "Add independent icon and text opacity controls"
          git push origin HEAD:feature/opacity-controls
