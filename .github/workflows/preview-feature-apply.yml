name: Apply placemark preview feature to main

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/preview-feature-apply.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-build:
    runs-on: windows-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply missing feature patches
        shell: bash
        run: |
          set -euo pipefail
          for patch in \
            .github/preview-feature/02-batch-service.patch \
            .github/preview-feature/03-main-viewmodel.patch \
            .github/preview-feature/04-main-window.patch; do
            echo "Applying $patch"
            git apply --check "$patch"
            git apply "$patch"
          done

      - name: Validate XAML structure
        shell: pwsh
        run: |
          [xml](Get-Content -Raw 'KmlScopedEditor/MainWindow.xaml') | Out-Null
          [xml](Get-Content -Raw 'KmlScopedEditor/Views/PlacemarkPreviewControl.xaml') | Out-Null
          Write-Host 'The XAML files are well-formed XML.'

      - name: Build Windows application
        shell: pwsh
        run: |
          dotnet build .\KmlScopedEditor.sln --configuration Release --nologo

      - name: Remove temporary patch infrastructure
        shell: bash
        run: |
          rm -rf .github/preview-feature
          rm -f .github/workflows/preview-feature-apply.yml

      - name: Commit applied feature
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Wire placemark preview and custom icon UI into application"
          git push origin HEAD:main
