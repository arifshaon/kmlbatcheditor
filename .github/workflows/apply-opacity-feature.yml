name: Apply opacity controls feature

# The base-branch PR workflow performs the validated transformation.
# This temporary file will be removed after the feature build passes.
on:
  push:
    branches:
      - feature/opacity-controls
    paths:
      - '.github/opacity-feature/**'
      - '.github/workflows/apply-opacity-feature.yml'

permissions:
  contents: write

jobs:
  apply-and-build:
    runs-on: windows-latest

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/opacity-controls
          fetch-depth: 0

      - name: Apply source transformations
        shell: pwsh
        run: |
          python .github/opacity-feature/apply.py

      - name: Validate XAML
        shell: pwsh
        run: |
          [xml](Get-Content -Raw 'KmlScopedEditor/MainWindow.xaml') | Out-Null
          Write-Host 'MainWindow.xaml is well-formed XML.'

      - name: Build Windows application
        shell: pwsh
        run: |
          dotnet build .\KmlScopedEditor.sln --configuration Release --nologo

      - name: Remove temporary implementation files
        shell: bash
        run: |
          rm -rf .github/opacity-feature
          rm -f .github/workflows/apply-opacity-feature.yml

      - name: Commit implemented feature
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add independent icon and text opacity controls"
          git push origin HEAD:feature/opacity-controls
